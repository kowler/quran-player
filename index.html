<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>القرآن الكريم — محمد سايد | ورش</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 12px;
  }
  .header h1 { font-size: 1.3rem; color: #c9a84c; letter-spacing: 0.03em; }
  .header p  { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }

  /* ── View Toggle ── */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 99px;
    padding: 3px;
    margin-bottom: 20px;
  }
  .view-btn {
    background: transparent;
    border: none;
    color: #8b949e;
    font-size: 0.82rem;
    padding: 6px 16px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .view-btn.active {
    background: #c9a84c;
    color: #0d1117;
    font-weight: 600;
  }

  /* ── Now Playing Card ── */
  .now-playing {
    background: linear-gradient(135deg, #1c2128 0%, #161b22 100%);
    border: 1px solid #30363d;
    border-radius: 18px;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .hizb-badge {
    display: inline-block;
    background: #c9a84c22;
    border: 1px solid #c9a84c55;
    color: #c9a84c;
    font-size: 0.75rem;
    padding: 3px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
  }
  .hizb-title  { font-size: 1.35rem; font-weight: 700; color: #e6edf3; line-height: 1.5; margin-bottom: 6px; }
  .hizb-fatiha { font-size: 0.9rem; color: #8b949e; margin-bottom: 18px; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    direction: ltr;
  }
  .progress-bar-bg {
    flex: 1; height: 6px;
    background: #21262d;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a84c, #e8c876);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.75rem; color: #c9a84c; white-space: nowrap; min-width: 48px; text-align: right; }

  .controls { display: flex; justify-content: center; align-items: center; gap: 16px; }
  .btn {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 50%;
    color: #c9a84c;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.92); background: #2d333b; }
  .btn-sm { width: 44px; height: 44px; font-size: 1.1rem; }
  .btn-lg { width: 60px; height: 60px; font-size: 1.5rem; background: #c9a84c; color: #0d1117; border-color: #c9a84c; }
  .btn-lg:active { background: #e8c876; }
  .loop-toggle {
    margin-top: 10px;
    display: inline-flex;
    gap: 3px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 99px;
    padding: 3px;
  }
  .loop-opt {
    background: transparent;
    border: none;
    color: #8b949e;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .loop-opt.active {
    background: #c9a84c;
    color: #0d1117;
    font-weight: 600;
  }

  /* ── Resume banner ── */
  .saved-pos {
    background: #1f6feb18;
    border: 1px solid #1f6feb33;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #58a6ff;
    display: none;
    cursor: pointer;
    width: 100%;
    max-width: 480px;
  }
  .saved-pos span { color: #8b949e; display: block; font-size: 0.75rem; margin-top: 2px; }

  /* ── Playlist ── */
  .playlist { width: 100%; max-width: 480px; }
  .playlist-header { font-size: 0.8rem; color: #8b949e; margin-bottom: 10px; padding-right: 4px; }

  .hizb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .hizb-item:active, .hizb-item:hover { background: #1c2128; }

  /* Active — currently playing */
  .hizb-item.active { background: #c9a84c18; border-color: #c9a84c33; }
  .hizb-item.active .hizb-num  { background: #c9a84c; color: #0d1117; font-weight: 700; }
  .hizb-item.active .hizb-name { color: #c9a84c; font-weight: 600; }

  /* Done — all ahzab strictly before last-heard */
  .hizb-item.done { opacity: 0.65; }
  .hizb-item.done .hizb-num  { background: #238636; color: #fff; font-size: 0.68rem; }
  .hizb-item.done .hizb-name { color: #7ee787; }
  .hizb-item.done .hizb-sub  { color: #3fb950; }

  /* Last heard */
  .hizb-item.last-heard { background: #c9a84c0d; border-color: #c9a84c44; opacity: 1; }
  .hizb-item.last-heard .hizb-name { color: #e6c97e; }

  .hizb-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #21262d;
    color: #8b949e;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .hizb-info { flex: 1; min-width: 0; }
  .hizb-name { font-size: 0.92rem; color: #e6edf3; }
  .hizb-sub  { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
  .eq-icon   { font-size: 1rem; color: #c9a84c; flex-shrink: 0; }

  .last-heard-badge {
    font-size: 0.68rem;
    background: #c9a84c22; border: 1px solid #c9a84c55;
    color: #c9a84c;
    padding: 2px 7px; border-radius: 99px;
    white-space: nowrap; flex-shrink: 0;
  }

  .expand-icon {
    font-size: 0.7rem; color: #8b949e; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .hizb-item.expanded .expand-icon { transform: rotate(90deg); }

  #yt-frame { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  /* ── Athman View ── */
  .athman-list {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    width: 100%;
    padding-right: 16px;
  }
  .athman-list.open { max-height: 500px; }

  .athman-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 3px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid transparent;
  }
  .athman-item:active, .athman-item:hover { background: #1c2128; }
  .athman-item.active { background: #c9a84c15; border-color: #c9a84c33; }
  .athman-item.active .athman-num { background: #c9a84c; color: #0d1117; }
  .athman-item.playing .athman-num { background: #c9a84c; color: #0d1117; }

  .athman-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #21262d;
    color: #8b949e;
    font-size: 0.68rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .athman-label { flex: 1; font-size: 0.82rem; color: #e6edf3; }
  .athman-source {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .athman-source.yt { background: #ff000022; color: #ff5555; }
  
  .athman-source.none { background: #30363d; color: #484f58; }
  .athman-item.disabled { opacity: 0.4; cursor: default; }
  .athman-item.disabled:hover { background: transparent; }
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────
let currentIdx = 0;
let isPlaying  = false;
let player     = null;
let apiReady   = false;
let currentView = 'hizb'; // 'hizb' or 'athman'
let expandedHizb = -1;
let currentAthman = null; // {hizb, athman} when playing athman
let loopMode = true; // true = loop current, false = move to next

// ── Persist ───────────────────────────────────────────────────────────────────
function savePos(idx) {
  localStorage.setItem('quran_pos', JSON.stringify({
    idx, title: AHZAB[idx].title, sub: AHZAB[idx].sub, ts: new Date().toISOString()
  }));
  const heard = getHeard();
  if (!heard.includes(idx)) { heard.push(idx); setHeard(heard); }
}
function loadPos()  { try { return JSON.parse(localStorage.getItem('quran_pos')); } catch(e) { return null; } }
function getHeard() { try { return JSON.parse(localStorage.getItem('quran_heard') || '[]'); } catch(e) { return []; } }
function setHeard(a){ localStorage.setItem('quran_heard', JSON.stringify(a)); }
function getLastHeardIdx() {
  const h = getHeard();
  return h.length ? Math.max(...h) : -1;
}

// ── View Switching ────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById('tab-hizb').classList.toggle('active', view === 'hizb');
  document.getElementById('tab-athman').classList.toggle('active', view === 'athman');
  // Now-playing card stays visible in both views
  document.getElementById('resume-banner').style.display = view === 'hizb' ? document.getElementById('resume-banner').style.display : 'none';
  document.getElementById('playlist-label').textContent = view === 'hizb' ? 'قائمة التشغيل — 60 حزباً' : 'الأثمان — اضغط على حزب لتوسيعه';
  buildPlaylist();
  updateNowPlaying();
}

// ── Hizb Playlist ──────────────────────────────────────────────────────────────
function buildPlaylist() {
  const container  = document.getElementById('playlist-items');
  container.innerHTML = '';
  const lastHeard  = getLastHeardIdx();

  AHZAB.forEach((h, i) => {
    const isActive  = i === currentIdx && currentView === 'hizb';
    const isDone    = !isActive && i < lastHeard;
    const isLastH   = !isActive && i === lastHeard;

    let cls = 'hizb-item';
    if (isActive) cls += ' active';
    else if (isDone)  cls += ' done';
    else if (isLastH) cls += ' last-heard';

    if (currentView === 'athman' && expandedHizb === i) cls += ' expanded';

    const numContent = (isDone || isLastH) ? '✓' : h.n;
    let badge = '';
    if (isActive) badge = '<div class="eq-icon">♪</div>';
    else if (isLastH) badge = '<span class="last-heard-badge">آخر استماع</span>';

    const expandArrow = currentView === 'athman' ? '<div class="expand-icon">▶</div>' : '';

    const div = document.createElement('div');
    div.className = cls;
    div.id = 'item-' + i;
    div.onclick = () => {
      if (currentView === 'hizb') {
        jumpTo(i);
      } else {
        toggleAthmanExpand(i);
      }
    };
    div.innerHTML = `
      <div class="hizb-num">${numContent}</div>
      <div class="hizb-info">
        <div class="hizb-name">${h.title}</div>
        <div class="hizb-sub">${h.sub}</div>
      </div>
      ${badge}${expandArrow}`;
    container.appendChild(div);

    // Athman sub-list
    if (currentView === 'athman') {
      const athmanDiv = document.createElement('div');
      athmanDiv.className = 'athman-list' + (expandedHizb === i ? ' open' : '');
      athmanDiv.id = 'athman-' + i;

      const hizbAthman = ATHMAN_DATA[i] ? ATHMAN_DATA[i].athman : [];
      hizbAthman.forEach(at => {
        const isPlayingAthman = currentAthman && currentAthman.hizb === i && currentAthman.athman === at.a;
        let itemCls = 'athman-item';
        if (isPlayingAthman) itemCls += ' playing';
        if (at.t === 'none') itemCls += ' disabled';

        const sourceLabel = at.t === 'yt' ? 'يوتيوب' : '—';
        const sourceCls = 'athman-source ' + at.t;

        const aDiv = document.createElement('div');
        aDiv.className = itemCls;
        aDiv.onclick = (e) => {
          e.stopPropagation();
          if (at.t === 'none') return;
          playAthman(i, at);
        };
        aDiv.innerHTML = `
          <div class="athman-num">${at.a}</div>
          <div class="athman-label">الثمن ${at.a}</div>
          <div class="${sourceCls}">${sourceLabel}</div>
        `;
        athmanDiv.appendChild(aDiv);
      });

      container.appendChild(athmanDiv);
    }
  });
}

function toggleAthmanExpand(idx) {
  if (expandedHizb === idx) {
    expandedHizb = -1;
  } else {
    expandedHizb = idx;
  }
  buildPlaylist();
  if (expandedHizb === idx) {
    const el = document.getElementById('athman-' + idx);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── Loop Mode ─────────────────────────────────────────────────────────────────
function setLoopMode(loop) {
  loopMode = loop;
  document.getElementById('loop-on-btn').classList.toggle('active', loop);
  document.getElementById('loop-off-btn').classList.toggle('active', !loop);
  localStorage.setItem('quran_loop', loop ? '1' : '0');
}

// ── Athman Playback ──────────────────────────────────────────────────────────
function playAthman(hizbIdx, athman) {
  currentAthman = { hizb: hizbIdx, athman: athman.a };
  currentIdx = hizbIdx; // sync now-playing display

  if (athman.t === 'yt') {
    if (!apiReady) { loadYTApi(); return; }
    if (!player) { initPlayer(); return; }
    player.loadVideoById(athman.id);
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    updateNowPlaying();
  }

  buildPlaylist();
}

// ── Now Playing ───────────────────────────────────────────────────────────────
function updateNowPlaying() {
  const h = AHZAB[currentIdx];

  if (currentView === 'athman' && currentAthman) {
    document.getElementById('badge').textContent     = `الثمن ${currentAthman.athman} / 8`;
    document.getElementById('now-title').textContent = `الحزب ${h.n} — الثمن ${currentAthman.athman}`;
    document.getElementById('now-fatiha').textContent = h.sub;
    document.getElementById('prog-label').textContent = `${currentAthman.athman} / 8`;
    document.getElementById('prog-fill').style.width  = (currentAthman.athman / 8 * 100).toFixed(2) + '%';
  } else {
    document.getElementById('badge').textContent      = `الحزب ${h.n} / 60`;
    document.getElementById('now-title').textContent  = h.title;
    document.getElementById('now-fatiha').textContent = h.sub;
    document.getElementById('prog-label').textContent = `${h.n} / 60`;
    document.getElementById('prog-fill').style.width  = ((currentIdx + 1) / AHZAB.length * 100).toFixed(2) + '%';
  }
  document.getElementById('play-btn').textContent   = isPlaying ? '⏸' : '▶';
  buildPlaylist();
  const active = document.getElementById('item-' + currentIdx);
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── YouTube IFrame API ────────────────────────────────────────────────────────
function loadYTApi() {
  if (window.YT && window.YT.Player) { initPlayer(); return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
window.onYouTubeIframeAPIReady = function() { apiReady = true; initPlayer(); };

function initPlayer() {
  player = new YT.Player('yt-frame', {
    height: '1', width: '1',
    videoId: AHZAB[currentIdx].id,
    playerVars: { autoplay: 0, controls: 0, rel: 0, playsinline: 1 },
    events: { onReady: () => {}, onStateChange: onStateChange }
  });
}

function onStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    if (currentView === 'athman' && currentAthman) {
      if (loopMode) {
        // Loop: replay same athman
        const hizbAthman = ATHMAN_DATA[currentAthman.hizb] ? ATHMAN_DATA[currentAthman.hizb].athman : [];
        const cur = hizbAthman.find(a => a.a === currentAthman.athman);
        if (cur) player.loadVideoById(cur.id);
      } else {
        // Next: try next athman in same hizb, then next hizb's first athman
        const hizbAthman = ATHMAN_DATA[currentAthman.hizb] ? ATHMAN_DATA[currentAthman.hizb].athman : [];
        const next = hizbAthman.find(a => a.a === currentAthman.athman + 1);
        if (next) {
          playAthman(currentAthman.hizb, next);
        } else {
          // Wrap to next hizb's first athman
          const nextHizb = (currentAthman.hizb + 1) % AHZAB.length;
          const nextHizbAthman = ATHMAN_DATA[nextHizb] ? ATHMAN_DATA[nextHizb].athman : [];
          if (nextHizbAthman.length) {
            expandedHizb = nextHizb;
            playAthman(nextHizb, nextHizbAthman[0]);
          }
        }
      }
      return;
    }
    // Hizb view
    if (loopMode) {
      player.loadVideoById(AHZAB[currentIdx].id);
    } else {
      savePos(currentIdx);
      currentIdx = (currentIdx + 1) % AHZAB.length;
      updateNowPlaying();
      player.loadVideoById(AHZAB[currentIdx].id);
    }
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
  }
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
  }
  if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    savePos(currentIdx);
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
function togglePlay() {
  if (!apiReady) { loadYTApi(); return; }
  if (!player) return;
  if (isPlaying) { player.pauseVideo(); }
  else { player.playVideo(); }
}

function nextTrack() {
  if (currentView === 'athman' && currentAthman) {
    const hizbAthman = ATHMAN_DATA[currentAthman.hizb] ? ATHMAN_DATA[currentAthman.hizb].athman : [];
    const next = hizbAthman.find(a => a.a === currentAthman.athman + 1);
    if (next) { playAthman(currentAthman.hizb, next); return; }
    // Wrap to next hizb's first athman
    const nextHizb = (currentAthman.hizb + 1) % AHZAB.length;
    const nextHizbAthman = ATHMAN_DATA[nextHizb] ? ATHMAN_DATA[nextHizb].athman : [];
    if (nextHizbAthman.length) { expandedHizb = nextHizb; playAthman(nextHizb, nextHizbAthman[0]); }
  } else {
    currentIdx = (currentIdx + 1) % AHZAB.length;
    jumpTo(currentIdx);
  }
}

function prevTrack() {
  if (currentView === 'athman' && currentAthman) {
    const hizbAthman = ATHMAN_DATA[currentAthman.hizb] ? ATHMAN_DATA[currentAthman.hizb].athman : [];
    const prev = hizbAthman.find(a => a.a === currentAthman.athman - 1);
    if (prev) { playAthman(currentAthman.hizb, prev); return; }
    // Wrap to prev hizb's last athman
    const prevHizb = (currentAthman.hizb - 1 + AHZAB.length) % AHZAB.length;
    const prevHizbAthman = ATHMAN_DATA[prevHizb] ? ATHMAN_DATA[prevHizb].athman : [];
    if (prevHizbAthman.length) { expandedHizb = prevHizb; playAthman(prevHizb, prevHizbAthman[prevHizbAthman.length - 1]); }
  } else {
    currentIdx = (currentIdx - 1 + AHZAB.length) % AHZAB.length;
    jumpTo(currentIdx);
  }
}

function nextHizb() { nextTrack(); }
function prevHizb() { prevTrack(); }

function jumpTo(idx) {
  currentIdx = idx;
  currentAthman = null;
  updateNowPlaying();
  if (player && apiReady) {
    player.loadVideoById(AHZAB[idx].id);
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
  } else {
    loadYTApi();
  }
  savePos(idx);
}

function resumeFromSaved() {
  const pos = loadPos();
  if (!pos) return;
  document.getElementById('resume-banner').style.display = 'none';
  jumpTo(pos.idx);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  // Restore loop mode preference
  const savedLoop = localStorage.getItem('quran_loop');
  if (savedLoop !== null) setLoopMode(savedLoop === '1');

  const pos = loadPos();
  if (pos && pos.idx > 0) {
    currentIdx = pos.idx;
    const banner = document.getElementById('resume-banner');
    const d = new Date(pos.ts);
    document.getElementById('resume-title').textContent = pos.title + ' — ' + pos.sub;
    document.getElementById('resume-time').textContent  = 'آخر جلسة: ' + d.toLocaleDateString('ar-MA') + ' ' + d.toLocaleTimeString('ar-MA',{hour:'2-digit',minute:'2-digit'});
    banner.style.display = 'block';
  }
  buildPlaylist();
  updateNowPlaying();
  loadYTApi();
})();
</script>
